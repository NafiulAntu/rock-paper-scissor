<!DOCTYPE html>
<html>

<head>
  <title>DOM projects</title>

<body>
  <p>Youtube Suscrube Button</p>

  <button onclick="
    
    Subscribe();
    " class="js-subscribe-button">
    Subscribe

  </button>

  <p>Amazon Shipping Calculator</p>
  <input placeholder="Cost of order" class="js-cost-input" onkeydown="
  handleCostKeydown(event);
 
  ">

  <button onclick="
  
  calculateTotal();
  
  ">Calculete</button>
  <p class="js-total-cost"></p>

  <script>

    String(25)
    console.log('25' - 5);
    console.log('25' + 5);

    window.document
    window.console.log('window');
    window.alert

    function handleCostKeydown(event) {

      if (event.key === 'Enter') {
        calculateTotal()
      }
    }

    //clicks,keydowns=>events
    //onclick,onkeydown=>event listeners
    //airokom amon onk mal ase...

    function calculateTotal() {
      const inputElement = document.querySelector('.js-cost-input');
      let cost = Number(inputElement.value);
      //console.log(cost);

      if (cost < 40) {
        cost = cost + 10;
        //console.log(cost);
        //console.log(typeof cost);
      }
      document.querySelector('.js-total-cost')

        .innerHTML = `$${cost}`;
    }



    function Subscribe() {
      const buttonElement = document.querySelector('.js-subscribe-button');

      if (buttonElement.innerText === 'Subscribe') {
        buttonElement.innerHTML = 'Subscribed';
      } else {
        buttonElement.innerHTML = 'Subscribe';
      }

    }







    /*


    in this lesson:
    1.Document(DOM)=full web page controle kore.
    2.document.querySlector()=web pager element ,javaScript a vitor a ane.
    3.innerHTML=HTML modify kore ,HTML a element ar vitore.
    4.3 ta project korsi DOM use kore.
    5.onkeydown=aita diy element interactive kore keyboard using key down.



     */

  </script>

</body>

</html>
